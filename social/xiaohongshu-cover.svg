  <text x="278" y="1324" fill="#9AB2B8" font-size="26" font-family="'SF Pro Display','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-weight="600" letter-spacing="2.5">TYPELINGO / MACOS / LIVE TRANSLATION</text>
